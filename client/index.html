  </head>
  <body>
    <script>
      // Compute the backend proxy base URL from the current page location.
      // When deployed, the app is served from a URL like:
      //   https://host/.../signal-engine/dist/public/index.html
      // The backend proxy lives at:
      //   https://host/.../signal-engine/port/5000
      // In local dev (localhost) we use empty string so relative URLs work.
      (function() {
        var loc = window.location.href;
        var isLocal = loc.indexOf('localhost') !== -1 || loc.indexOf('127.0.0.1') !== -1;
        if (isLocal) {
          window.__API_BASE__ = '';
          return;
        }
        // Strip everything from /dist/public onwards, then append /port/5000
        var idx = loc.indexOf('/dist/public');
        if (idx !== -1) {
          window.__API_BASE__ = loc.substring(0, idx) + '/port/5000';
        } else {
          // Fallback: go up two path levels from the page URL
          window.__API_BASE__ = loc.replace(/\/[^\/]*\/[^\/]*$/, '') + '/port/5000';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
